<section class="section jobs" id='jobs'>
    <div class="container">
        <div class="section-box">
            
            <!--Experience -->
            <div class="about-title mb-5" data-aos="fade-up" data-aos-duration="1000">
                <h3 class="e-font section-title">
                    <span class='code-font n-section-title'>2.1</span> Experience
                </h3>
            </div>


            <div class="jobs-tabs" data-aos="fade-up" data-aos-duration="1000">
                <ul ngbNav #nav="ngbNav" [(activeId)]="active" orientation="vertical" class="nav-tabs jobs-tabs">
                  <li *ngFor='let company of Experiences ; let i = index' [title]="company.Tab" [ngbNavItem]="i">
                    <a ngbNavLink>{{company.Tab}}</a>

                    <ng-template ngbNavContent>
                      <div *ngFor="let job of company.jobs">
                        <div class="job-header-line">
                          <h4 class="title-tab-content">{{ job.Title }}</h4>
                          <span class="job-location">
                                <i class="fas fa-map-marker-alt"></i>&nbsp; {{ job.location }}
                          </span>
                        </div>

                        <h5 class="job-time">{{job.Date}}</h5>
                        <p *ngFor='let jobDescriptionParagraph of job.Description' class="job-description">
                          {{jobDescriptionParagraph}}
                        </p>
                        <hr />
                      </div>
                    </ng-template>
                  </li>
                </ul>
                <div [ngbNavOutlet]="nav" class="mt-2"></div>
            </div>

            <!--Education-->

            <div class="about-title mb-5 mt-5" data-aos="fade-up" data-aos-duration="1000">
                <h3 class="e-font section-title">
                    <span class='code-font n-section-title'>2.2</span> Education
                </h3>
            </div>

            <div class="education-section" data-aos="fade-up" >
                <div *ngFor="let edu of Education" class="education-item">
                    <h3 class="education-school">
                    {{ edu.Ecole }}
                    </h3>
                    <h4 class="education-speciality">
                    {{ edu.Specialite }}
                    </h4>
                    <span class="education-date">
                    {{ edu.Date }}
                    </span>
                </div>
            </div>


<!-- Skills -->
<div class="about-title mb-5 mt-5" data-aos="fade-up" data-aos-duration="1000">
  <h3 class="e-font section-title">
    <span class='code-font n-section-title'>2.3</span> Skills
  </h3>
</div>

<div class="tech-wrapper">
  <button class="scroll-btn left" (click)="scrollLeft()">&lt;</button>

  <div class="tech-container" #techContainer>
    <div class="tech-scroll">
      <div class="tech-item" *ngFor="let tech of technologies">
        <div class="tech-icon">
          <img [src]="tech.logo" [alt]="tech.name" />
        </div>
        <div class="tech-name">
          {{ tech.name }}
        </div>
      </div>
    </div>
  </div>

  <button class="scroll-btn right" (click)="scrollRight()">&gt;</button>
</div>

                <h3 class="e-font section-title">
                    <span class='code-font n-section-title'>2.4</span> Certificats
                </h3>
            </div>-->
        
        </div>
    </div>
</section>
