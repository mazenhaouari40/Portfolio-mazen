<section class="section banner">
  <div [@bannerTrigger] class="container">
    <div class="section-box-banner">

      <!-- LEFT -->
      <div class="banner-left">
        <div class="content">
          <h1>Hello! My name is</h1>

          <div class="banner-title">
            <h2 class="text-capitalize">Mazen Haouari.</h2>
            <h3 class="text-capitalize">Software engineer intern</h3>
          </div>

          <div class="banner-description">
            <p class="mt-4">
              <span class="underline">Third-year </span>
              Software Engineering student at the Higher Institute of Computer Science.
            </p>
          </div>

          <div class="div-btn-banner">
            <a (click)="downloadCV()" download class="main-btn text-capitalize">
              Download cv
            </a>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="banner-right" data-aos="fade-up">
        <div class="about-img-container">
          <img src="assets/images/Mazen.jpg" alt="Mazen" />
        </div>
      </div>

    </div>
  </div>
</section>
